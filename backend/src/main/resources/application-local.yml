spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    clean-disabled: false

logging:
  level:
    com.umg: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

app:
  security:
    aes-key: localdev_aes_key_32bytes_long!!
    jwt-secret: localDevJwtSecretKeyForTestingPurposesOnly2024!
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:8080
