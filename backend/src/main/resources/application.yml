server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: umg-backend

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:umg}
    username: ${DB_USERNAME:umg_user}
    password: ${DB_PASSWORD:umg_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
        types:
          jackson:
            object-mapper: jacksonObjectMapper

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  security:
    aes-key: ${AES_SECRET_KEY:0123456789abcdef0123456789abcdef}
    jwt-secret: ${JWT_SECRET:myDefaultJwtSecretKeyThatShouldBeChangedInProduction2024!}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    jwt-refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}
  rate-limit:
    default-per-minute: ${RATE_LIMIT_DEFAULT:60}
    admin-per-minute: ${RATE_LIMIT_ADMIN:300}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,caches
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    metrics:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [traceId=%X{traceId:-}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.umg: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
