version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: umg-postgres
    environment:
      POSTGRES_DB: umg
      POSTGRES_USER: umg
      POSTGRES_PASSWORD: umg_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: umg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umg-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/umg
      SPRING_DATASOURCE_USERNAME: umg
      SPRING_DATASOURCE_PASSWORD: umg_dev_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      UMG_AES_SECRET_KEY: ${UMG_AES_SECRET_KEY:-dev-aes-key-32-chars-long!!!!!}
      UMG_JWT_SECRET: ${UMG_JWT_SECRET:-dev-jwt-secret-key-at-least-32-chars!!}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: umg-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
